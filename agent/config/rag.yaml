rag:
  enabled: true
  framework: llamaindex
  vector_db: chroma
  embedding_model: qwen3-embedding:0.6b
  persist_path: agent/rag/chroma
  collection_name: local_knowledge
  top_k: 3
  min_score: 0.0

knowledge_paths:
  - agent/knowledge/docs
  - agent/knowledge/notes
  - agent/knowledge/logs
  - agent/knowledge/procedures
  - agent/knowledge/errors
  - agent/knowledge/skill_notes
  - agent/knowledge/summaries
