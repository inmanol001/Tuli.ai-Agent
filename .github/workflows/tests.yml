name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ollama pydantic pyyaml python-dotenv rich typer pytest

      - name: Syntax check
        run: |
          python -m compileall agent

  full-tests:
    name: Full pytest suite informational
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ollama pydantic pyyaml python-dotenv rich typer pytest

      - name: Run full pytest suite
        run: |
          pytest
